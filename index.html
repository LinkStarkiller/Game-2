<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPS Challenge</title>
  <style>
    /* --- CSS: Drop your custom styles and art here later --- */
    body {
      background-color: #1a1a1a;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      text-align: center;
      padding: 20px;
    }
    #game-container {
      max-width: 600px;
      margin: 0 auto;
      background: #2a2a2a;
      padding: 20px;
      border: 2px solid #555;
      border-radius: 8px;
    }
    .hidden { display: none; }
    button {
      background-color: #444;
      color: #fff;
      border: 1px solid #888;
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover { background-color: #666; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    input[type="text"] {
      padding: 10px;
      font-size: 16px;
      width: 70%;
      margin-bottom: 10px;
    }
    #battle-log {
      margin-top: 20px;
      padding: 15px;
      background: #000;
      border: 1px solid #444;
      min-height: 80px;
      text-align: left;
    }
    .stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 1.2em;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div id="game-container">
    <div id="setup-screen">
      <h2>SYSTEM CALIBRATION</h2>
      <p>Enter your device connection key to begin.</p>
      <input type="text" id="handyKey" placeholder="Connection Key (e.g., 1234567890abcdef)">
      <br>
      <button onclick="connectHandy()">INITIALIZE</button>
      <p id="setup-status"></p>
    </div>

    <div id="game-screen" class="hidden">
      <div class="stats">
        <span id="player-stat">Kevin's HP: 3</span>
        <span id="enemy-stat">Boss HP: 3</span>
      </div>

      <div id="controls">
        <button id="btn-rock" onclick="playRound('rock')">ROCK</button>
        <button id="btn-paper" onclick="playRound('paper')">PAPER</button>
        <button id="btn-scissors" onclick="playRound('scissors')">SCISSORS</button>
      </div>

      <div id="battle-log">
        <em>Awaiting your move...</em>
      </div>
    </div>
  </div>

  <script>
    /* --- JAVASCRIPT: Game Logic and API Bridge --- */
    
    let connectionKey = '';
    let playerHealth = 3;
    let enemyHealth = 3;
    const playerName = "Kevin";

    // 1. Connection & Setup
    function connectHandy() {
      const keyInput = document.getElementById('handyKey').value.trim();
      if (keyInput) {
        connectionKey = keyInput;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        logMessage(`System connected. Enemy approaches!`);
      } else {
        document.getElementById('setup-status').innerText = "Please enter a valid key.";
      }
    }

    // 2. Helper to update the retro battle text
    function logMessage(msg) {
      document.getElementById('battle-log').innerHTML = `> ${msg}`;
    }

    // 3. Helper to update health display
    function updateStats() {
      document.getElementById('player-stat').innerText = `${playerName}'s HP: ${playerHealth}`;
      document.getElementById('enemy-stat').innerText = `Boss HP: ${enemyHealth}`;
    }

    // 4. Toggle buttons to prevent spamming during API calls
    function toggleButtons(disabled) {
      document.getElementById('btn-rock').disabled = disabled;
      document.getElementById('btn-paper').disabled = disabled;
      document.getElementById('btn-scissors').disabled = disabled;
    }

    // 5. Core Game Loop
    async function playRound(playerMove) {
      toggleButtons(true); // Lock controls
      
      const moves = ['rock', 'paper', 'scissors'];
      const enemyMove = moves[Math.floor(Math.random() * moves.length)];
      
      let outcome = '';

      if (playerMove === enemyMove) {
        outcome = "tie";
        logMessage(`Enemy used ${enemyMove.toUpperCase()}. It's a clash! Tension builds...`);
        await triggerHandy(20, 100); // Small, slow tease
      } 
      else if (
        (playerMove === 'rock' && enemyMove === 'scissors') ||
        (playerMove === 'paper' && enemyMove === 'rock') ||
        (playerMove === 'scissors' && enemyMove === 'paper')
      ) {
        outcome = "win";
        enemyHealth -= 1;
        logMessage(`Enemy used ${enemyMove.toUpperCase()}. Critical hit! Boss takes damage.`);
        // No hardware trigger on win
      } 
      else {
        outcome = "lose";
        playerHealth -= 1;
        
        if (playerHealth > 0) {
          logMessage(`Enemy used ${enemyMove.toUpperCase()}. You got hit! Physical penalty engaged.`);
          await triggerHandy(80, 250); // Fast, sharp stroke
        } else {
          logMessage(`Enemy used ${enemyMove.toUpperCase()}. HP depleted. FATAL ERROR. MAXIMUM PENALTY.`);
          await triggerHandy(100, 400); // Max speed, max length
          
          // Reset game after a few seconds
          setTimeout(() => {
            playerHealth = 3;
            enemyHealth = 3;
            updateStats();
            logMessage(`Game Reset. Ready for round 2.`);
          }, 4000);
        }
      }

      if (enemyHealth <= 0) {
        logMessage(`Boss defeated! Flawless victory.`);
        setTimeout(() => {
          playerHealth = 3;
          enemyHealth = 3;
          updateStats();
          logMessage(`A new challenger approaches...`);
        }, 4000);
      }

      updateStats();
      toggleButtons(false); // Unlock controls
    }

    // 6. Handy API Communication
    async function triggerHandy(positionPct, velocity) {
      if (!connectionKey) return;
      
      const url = 'https://www.handyfeeling.com/api/handy/v2/hdsp/xpva';
      
      try {
        await fetch(url, {
          method: 'PUT',
          headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/json',
            'X-Connection-Key': connectionKey
          },
          body: JSON.stringify({
            positionPercentage: positionPct, 
            velocityAbsolute: velocity      
          })
        });
      } catch (error) {
        console.error("Hardware connection failed:", error);
        logMessage("ERROR: Hardware sync failed. Check connection.");
      }
    }
  </script>
</body>
</html>
